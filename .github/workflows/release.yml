name: Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
      - "pytest.ini"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('poetry.lock') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev --all-extras

      - name: Run tests
        run: |
          mkdir -p test-reports
          poetry run pytest tests/ -v \
            --junitxml=test-reports/report.xml \
            --cov=src/valtron_core \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:test-reports/coverage.xml \
            --cov-report=html:test-reports/htmlcov

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('poetry.lock') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install poetry
        run: pip install poetry

      - name: Bump patch version
        id: bump
        run: |
          poetry version patch
          echo "version=$(poetry version -s)" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to $(poetry version -s) [skip ci]"
          git push

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: poetry publish

  github-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('poetry.lock') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install poetry
        run: pip install poetry

      - name: Build package
        run: poetry build

      - name: Generate changelog
        env:
          RELEASE_VERSION: v${{ needs.release.outputs.version }}
          GH_REPO: ${{ github.repository }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | grep -v "chore: bump version")
            DIFF_LINE="**Full history:** https://github.com/${GH_REPO}/commits/main"
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "chore: bump version")
            DIFF_LINE="**Full diff:** https://github.com/${GH_REPO}/compare/${PREV_TAG}...${RELEASE_VERSION}"
          fi
          {
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "$DIFF_LINE"
          } > changelog.md

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: v${{ needs.release.outputs.version }}
        run: |
          git tag "$RELEASE_VERSION"
          git push origin "$RELEASE_VERSION"
          gh release create "$RELEASE_VERSION" \
            --title "Release $RELEASE_VERSION" \
            --notes-file changelog.md \
            dist/*
