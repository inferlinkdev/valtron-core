<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Robot head (square) -->
  <rect x="4" y="6" width="24" height="22" rx="3" fill="#0a0c10" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Antenna -->
  <line x1="16" y1="6" x2="16" y2="2" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="1.5" r="1.5" fill="#3b82f6"/>

  <!-- Eyes (glowing squares) -->
  <rect x="8" y="12" width="5" height="5" rx="1" fill="#3b82f6"/>
  <rect x="19" y="12" width="5" height="5" rx="1" fill="#3b82f6"/>

  <!-- Mouth (grid of small squares) -->
  <rect x="10" y="21" width="3" height="3" rx="0.5" fill="#64748b"/>
  <rect x="14.5" y="21" width="3" height="3" rx="0.5" fill="#64748b"/>
  <rect x="19" y="21" width="3" height="3" rx="0.5" fill="#64748b"/>
</svg>
