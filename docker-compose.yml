version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: valtron-core-server
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./models:/app/models
      - ./templates:/app/templates
      - /Users/:/Users/
    stdin_open: true
    tty: true
    working_dir: /app
    command: bash

  wizard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: valtron-wizard
    ports:
      - "5000:5000"
    volumes:
      - ./configs:/app/configs
    working_dir: /app
    command: python -m valtron_core.utilities.config_wizard

  pipeline-test:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    working_dir: /app
    command: >
      bash -c "
        mkdir -p test-reports &&
        pytest tests/ -v --junitxml=test-reports/report.xml --cov=src/valtron_core --cov-branch --cov-report=term-missing --cov-report=xml:test-reports/coverage.xml --cov-report=html:test-reports/htmlcov
      "
